# 默认连接 MySQL（主机 10.60.19.54，端口 3307，库 sonic，root/password）；可通过环境变量覆盖
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:10.60.19.54}:${MYSQL_PORT:3307}/${MYSQL_DATABASE:sonic}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&autoReconnect=true&serverTimezone=GMT%2b8
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:password}
    schema:
      - classpath:data.sql
  sql:
    init:
      mode: always

mybatis-plus:
  mapper-locations: classpath*:com/gitee/sunchenbin/mybatis/actable/mapping/*/*.xml
  global-config:
    banner: false
  configuration:
    cache-enabled: false
    localCacheScope: STATEMENT
    # sql log
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

actable:
  model:
    pack: org.cloud.sonic.controller.models.domain
  table:
    auto: update
  database:
    type: mysql